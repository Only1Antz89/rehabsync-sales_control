# Railway service config for the cron runner.
# Deploy this directory as a NEW Railway service (Root Directory = ops/railway-cron).
# It runs once per schedule tick and exits — near-zero cost.

[build]
builder = "nixpacks"

[deploy]
startCommand = "node run.mjs"
# Run every 15 minutes. Step delays are day-granular, so this is plenty; adjust if you like.
cronSchedule = "*/15 * * * *"
# Cron jobs must not auto-restart after they exit.
restartPolicyType = "never"
numReplicas = 1
